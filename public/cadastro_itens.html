<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Itens — Marvel Universe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/componentes.css">
    <link rel="stylesheet" href="assets/css/cadastro.css">
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="assets/img/logo-marvel.png" alt="Marvel" class="logo-img">
        </a>
        <a href="index.html" class="btn-voltar">← Voltar</a>
    </div>
</nav>

<main class="cadastro-container">

    <div class="cadastro-header">
        <h1>Cadastro de Itens</h1>
        <p>Adicione ou edite filmes e séries do MCU.</p>
    </div>

    <div class="row g-4">

        
        <div class="col-md-5">
            <div class="cadastro-card">

                <h3 id="form-titulo" class="mb-3" style="font-size:20px;color:#e62429;">Novo Item</h3>

                <div class="cadastro-form">

                    <div class="campo">
                        <label>Título *</label>
                        <input type="text" id="campo-titulo" placeholder="Nome do filme ou série">
                    </div>

                    <div class="campo">
                        <label>Tipo</label>
                        <select id="campo-tipo">
                            <option value="Filme">Filme</option>
                            <option value="Série">Série</option>
                        </select>
                    </div>

                    <div class="form-row-cadastro">
                        <div class="campo">
                            <label>Lançamento *</label>
                            <input type="text" id="campo-lancamento" placeholder="Ex: 04/2008">
                        </div>
                        <div class="campo">
                            <label>Duração</label>
                            <input type="text" id="campo-duracao" placeholder="Ex: 2h 6min">
                        </div>
                    </div>

                    <div class="form-row-cadastro">
                        <div class="campo">
                            <label>Plataforma</label>
                            <input type="text" id="campo-plataforma" placeholder="Disney+">
                        </div>
                        <div class="campo">
                            <label>Classificação</label>
                            <input type="text" id="campo-classificacao" placeholder="12 anos">
                        </div>
                    </div>

                    <div class="campo">
                        <label>Fase do MCU</label>
                        <select id="campo-fase">
                            <option value="">Selecione</option>
                            <option>Fase 1</option>
                            <option>Fase 2</option>
                            <option>Fase 3</option>
                            <option>Fase 4</option>
                            <option>Fase 5</option>
                            <option>Fase 6</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label>Imagem</label>
                        <input type="text" id="campo-imagem" placeholder="assets/img/...">
                    </div>

                    <div class="campo">
                        <label>Sinopse *</label>
                        <textarea id="campo-sinopse" placeholder="Descrição do item..."></textarea>
                    </div>

                    <input type="hidden" id="campo-id">

                    <div id="form-erro" class="cadastro-erro hidden">
                        Preencha os campos obrigatórios.
                    </div>

                    <div class="cadastro-botoes">
                        <button onclick="salvarItem()" class="btn-salvar">💾 Salvar</button>
                        <button onclick="limparForm()" class="btn-limpar">✕ Cancelar</button>
                    </div>

                </div>
            </div>
        </div>

        
        <div class="col-md-7">
            <div class="cadastro-card">

                <h3 class="mb-3" style="font-size:20px;color:#e62429;">Itens Cadastrados</h3>

                <div class="d-flex gap-2 mb-3 flex-wrap align-items-center">
                    <input type="text" id="filtro-lista" class="form-control form-control-sm flex-fill input-dark"
                           placeholder="Buscar por título..." oninput="aplicarFiltros()">
                    <button id="ft-todos" class="btn-filtro-tipo active" onclick="setFiltroTipo('todos')">Todos</button>
                    <button id="ft-Filme" class="btn-filtro-tipo" onclick="setFiltroTipo('Filme')">Filmes</button>
                    <button id="ft-Série" class="btn-filtro-tipo" onclick="setFiltroTipo('Série')">Séries</button>
                </div>

                <div class="lista-cadastro-scroll">
                    <div id="lista-cadastro"></div>
                </div>

            </div>
        </div>

    </div>

</main>

<footer class="bg-dark text-white p-4 mt-5">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
                <img src="assets/img/logo-marvel.png" alt="Marvel" class="logo-img-footer">
                <p class="text-secondary footer-copy mt-1 mb-0">© 2026 Marvel Universe</p>
            </div>
            <div class="col-md-4 text-center mb-3 mb-md-0">
                <ul class="list-unstyled mb-0 d-flex justify-content-center gap-3">
                    <li><a href="index.html" class="footer-link">Início</a></li>
                </ul>
            </div>
            <div class="col-md-4 text-center text-md-end">
                <p class="text-secondary footer-copy mb-0">
                    Desenvolvido por <strong class="text-white">Bruna Scalabrini</strong><br>
                    PUC Minas — Engenharia de Software
                </p>
            </div>
        </div>
    </div>
</footer>

<script src="assets/js/login.js"></script>
<script src="assets/js/cadastro_itens.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
