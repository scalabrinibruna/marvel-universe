<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login — Marvel Universe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/componentes.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="assets/img/logo-marvel.png"
                     alt="Marvel"
                     class="logo-img">
            </a>
        </div>
    </nav>

    <main class="login-container">

        <div class="login-card">

            <a href="index.html" class="botao-voltar mb-20">
                ← Voltar
            </a>

            
            <div id="tela-login">

                <h2 class="login-titulo">
                    Login
                </h2>

                <p class="login-subtitulo">
                    Entre na sua conta Marvel.
                </p>

                <div class="login-form">

                    <div class="input-group-login">
                        <label>
                            Login
                        </label>

                        <input
                            type="text"
                            id="login-usuario"
                            placeholder="Seu login">
                    </div>

                    <div class="input-group-login">

                        <label>
                            Senha
                        </label>

                        <input
                            type="password"
                            id="login-senha"
                            placeholder="Sua senha">

                    </div>

                    <div id="login-erro"
                         class="login-erro hidden">

                        Login ou senha incorretos.

                    </div>

                    <button
                        onclick="fazerLogin()"
                        class="btn-login">

                        Entrar

                    </button>

                    <button
                        onclick="mostrarCadastro()"
                        class="btn-logout">

                        Criar conta
                    </button>
                </div>
            </div>


            

            <div id="tela-cadastro"
                 class="hidden">

                <h2 class="login-titulo">
                    Criar Conta
                </h2>

                <p class="login-subtitulo">
                    Cadastre-se para acessar o universo Marvel.
                </p>

                <div class="login-form">

                    <div class="input-group-login">
                        <label>Nome</label>

                        <input
                            type="text"
                            id="cadastro-nome"
                            placeholder="Seu nome">
                    </div>

                    <div class="input-group-login">

                        <label>Email</label>

                        <input
                            type="email"
                            id="cadastro-email"
                            placeholder="Seu email">

                    </div>

                    <div class="input-group-login">

                        <label>Login</label>

                        <input
                            type="text"
                            id="cadastro-login"
                            placeholder="Escolha um login">
                    </div>

                    <div class="input-group-login">

                        <label>Senha</label>

                        <input
                            type="password"
                            id="cadastro-senha"
                            placeholder="Escolha uma senha">

                    </div>

                    <div
                        id="cadastro-erro"
                        class="login-erro hidden">
                    </div>

                    <div
                        id="cadastro-sucesso"
                        class="login-sucesso hidden">

                        Conta criada! Faça login.

                    </div>

                    <button
                        onclick="fazerCadastro()"
                        class="btn-login">

                        Cadastrar

                    </button>

                    <button
                        onclick="mostrarLogin()"
                        class="btn-logout">

                        Já tenho conta
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/login.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
